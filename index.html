<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本季扭蛋抽獎</title>

<style>

body{
font-family: "Microsoft JhengHei", sans-serif;
background:#fbf3e6;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
height:60px;
margin-bottom:10px;
}

.machine{
width:80%;
max-width:300px;
margin:auto;
display:block;
}

.draw-area{
margin-top:15px;
padding:10px;
border-radius:12px;
background:#fff3f3;
border:1px solid #ffd0d0;
}

.draw-btn{
background:#d94848;
color:white;
border:none;
padding:14px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;
}

.draw-btn:disabled{
opacity:0.5;
}

.result{
margin-top:20px;
padding:15px;
border:2px dashed #fbbf24;
border-radius:12px;
display:none;
background:white;
}

.result h2{
margin:5px 0;
}

.reset-btn{
margin-top:10px;
background:#ddd;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

/* 彈窗 */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:260px;
}

.modal-box input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.modal-buttons{
margin-top:15px;
display:flex;
gap:10px;
}

.modal-buttons button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.confirm{
background:#d94848;
color:white;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>日本季扭蛋抽獎</h2>

<img src="machine.jpg" class="machine" id="machine">

<div class="draw-area">
<button class="draw-btn" id="drawBtn">按我抽獎</button>
</div>

<div class="result" id="resultBox">
<h3 id="tier"></h3>
<h2 id="prize"></h2>
<p id="note"></p>

<button class="reset-btn" id="resetBtn">重置</button>
</div>

</div>

<!-- 密碼彈窗 -->

<div class="modal" id="modal">
<div class="modal-box">

<h3>輸入重置密碼</h3>

<input type="password" id="passwordInput">

<div class="modal-buttons">
<button id="cancelBtn">取消</button>
<button class="confirm" id="confirmBtn">確認</button>
</div>

</div>
</div>

<script>

const prizes=[
{tier:"A賞",name:"💎 單人免費用餐",note:"最稀有大獎",weight:0.5},
{tier:"B賞",name:"🎫 整組免服務費",note:"現場使用",weight:10},
{tier:"C賞",name:"🎁 招待券100元",note:"下次使用",weight:10},
{tier:"B賞",name:"🥩 A5和牛",note:"限量獎品",weight:5},
{tier:"C賞",name:"🎂 壽星招待禮",note:"現場兌換",weight:20},
{tier:"參加",name:"🛍️ 環保袋",note:"基本獎品",weight:54.5}
]

const drawBtn=document.getElementById("drawBtn")
const resultBox=document.getElementById("resultBox")
const prizeText=document.getElementById("prize")
const tierText=document.getElementById("tier")
const noteText=document.getElementById("note")
const machine=document.getElementById("machine")

const modal=document.getElementById("modal")
const passwordInput=document.getElementById("passwordInput")

function pickPrize(){

let total=0

prizes.forEach(p=>total+=p.weight)

let r=Math.random()*total

for(let p of prizes){
r-=p.weight
if(r<=0) return p
}

}

drawBtn.onclick=function(){

drawBtn.disabled=true

machine.style.transform="rotate(-5deg)"

setTimeout(()=>{

machine.style.transform="rotate(5deg)"

},200)

setTimeout(()=>{

machine.style.transform="rotate(0deg)"

const p=pickPrize()

tierText.innerText=p.tier
prizeText.innerText=p.name
noteText.innerText=p.note

resultBox.style.display="block"

},500)

}

resetBtn.onclick=function(){

modal.style.display="flex"

}

cancelBtn.onclick=function(){

modal.style.display="none"

}

confirmBtn.onclick=function(){

if(passwordInput.value==="16888"){

modal.style.display="none"
resultBox.style.display="none"
drawBtn.disabled=false

}else{

alert("密碼錯誤")

}

}

</script>

</body>
</html>
